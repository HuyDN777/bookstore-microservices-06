  staff-service:
    extra_hosts:
      - "db-server:host-gateway"
    container_name: staff-service
    build: ./staff-service
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --noreload"
    ports:
      - "8012:8000"
    volumes:
      - ./staff-service:/app
    
  # Thêm service này vào chung mâm với các microservice khác
  db-server:
    image: mysql:8.0  # Thay bằng postgres nếu dự án của bạn xài PostgreSQL
    container_name: db-server
    environment:
      MYSQL_ROOT_PASSWORD: "123456" # Điền ĐÚNG mật khẩu bạn đang setup trong file settings.py ở máy local
      # Nếu có nhiều database rỗng cần tạo sẵn, bạn có thể tạo thủ công sau.
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

# Khối volumes này nằm ở cuối cùng file, sát lề trái hoàn toàn
volumes:
  db_data: