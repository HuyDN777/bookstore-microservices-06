version: '3.8'

services:
  api-gateway:
    extra_hosts:
      - "db-server:host-gateway"
    container_name: api-gateway
    build: ./api-gateway
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --noreload"
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway:/app

  auth-service:
    extra_hosts:
      - "db-server:host-gateway"
    container_name: auth-service
    build: ./auth-service
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --noreload"
    ports:
      - "8008:8000"
    volumes:
      - ./auth-service:/app

  book-service:
